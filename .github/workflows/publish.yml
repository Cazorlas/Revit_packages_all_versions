name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\RevitPackagesAllVersions.sln

      - name: Build
        run: dotnet build .\RevitPackagesAllVersions.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack .\RevitPackagesAllVersions\RevitPackagesAllVersions.csproj -c Release --no-build -o .\artifacts

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push package
        run: dotnet nuget push ".\artifacts\*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
