name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          source-url: https://nuget.pkg.github.com/Cazorlas/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore .\RevitPackagesAllVersions\RevitPackagesAllVersions.csproj

      - name: Build
        run: dotnet build .\RevitPackagesAllVersions\RevitPackagesAllVersions.csproj -c Release --no-restore

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $packageVersion = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $packageVersion = "${{ github.ref_name }}"
            if ($packageVersion.StartsWith("v")) {
              $packageVersion = $packageVersion.Substring(1)
            }
          }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Pack
        if: steps.version.outputs.package_version == ''
        run: dotnet pack .\RevitPackagesAllVersions\RevitPackagesAllVersions.csproj -c Release --no-build -o .\artifacts

      - name: Pack from tag version
        if: steps.version.outputs.package_version != ''
        run: dotnet pack .\RevitPackagesAllVersions\RevitPackagesAllVersions.csproj -c Release --no-build -o .\artifacts -p:Version=${{ steps.version.outputs.package_version }}

      - name: Push package to GitHub Packages
        run: dotnet nuget push ".\artifacts\*.nupkg" --source "https://nuget.pkg.github.com/Cazorlas/index.json" --skip-duplicate

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push package
        run: dotnet nuget push ".\artifacts\*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
