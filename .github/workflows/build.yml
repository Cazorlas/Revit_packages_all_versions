name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\RevitPackagesAllVersions.sln

      - name: Build
        run: dotnet build .\RevitPackagesAllVersions.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack .\RevitPackagesAllVersions\RevitPackagesAllVersions.csproj -c Release --no-build -o .\artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts\*.nupkg
